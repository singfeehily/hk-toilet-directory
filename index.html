<script>
        let map;
        let markersGroup;
        let routingControl = null;
        let toiletData = [];      
        let userLocation = null;  
        let userMarker = null;
        let selectedType = "all"; 

        function initMap() {
            map = L.map('map').setView([22.315, 114.170], 11); // 微調初始視角至更中心位置
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap contributors' }).addTo(map);
            markersGroup = L.layerGroup().addTo(map);
        }

        // 🚀 終極超強防卡死、防崩潰「三引擎數據合體」核心
        async function fetchToiletData() {
            document.getElementById('resultCount').innerText = "正在從全港公廁、商場及體育館數據庫下載資料...";
            toiletData = []; // 重設數據

            // === 引擎 1：安全載入 toilets.json (商場、社區會堂) ===
            try {
                const jsonResponse = await fetch('toilets.json');
                if (jsonResponse.ok) {
                    const jsonRaw = await jsonResponse.json();
                    const jsonFormatted = jsonRaw.map((item, index) => {
                        const lat = parseFloat(item.Latitude);
                        const lng = parseFloat(item.Longitude);
                        return {
                            id: 'mall_' + index,
                            name: (item.Name_tc || "未命名設施").trim(),
                            address: (item.Address_tc || "暫無地址").trim(),
                            district: (item.District_tc || "其他").trim(),
                            lat: lat,
                            lng: lng,
                            accessible: item.Barrier_free_access === "Yes" || item.Barrier_free_access === "設有",
                            hours: item.Opening_hours_tc || "10:00 - 22:00",
                            type: item.Type || "商場",
                            babyCare: item.Baby_care === "設有",
                            remarks: "",
                            distance: null 
                        };
                    }).filter(t => !isNaN(t.lat) && !isNaN(t.lng));
                    
                    toiletData = toiletData.concat(jsonFormatted);
                }
            } catch (e) { console.warn("提示: toilets.json 讀取或解析跳過:", e); }

            // === 引擎 2：安全載入食環署公廁 XML (支援 fehd_map_c.xml 和 toilets.xml) ===
            let xmlResponse = null;
            try {
                xmlResponse = await fetch('fehd_map_c.xml');
                if (!xmlResponse.ok) {
                    xmlResponse = await fetch('toilets.xml');
                }
                
                if (xmlResponse && xmlResponse.ok) {
                    const xmlText = await xmlResponse.text();
                    const parser = new DOMParser();
                    const xmlDoc = parser.parseFromString(xmlText, "text/xml");
                    
                    if (xmlDoc.getElementsByTagName("parsererror").length === 0) {
                        const records = xmlDoc.getElementsByTagName("map");
                        
                        const distMap = {
                            "CW": "中西區", "E": "東區", "S": "南區", "Wch": "灣仔區", "Is": "離島區",
                            "YT": "油尖旺區", "MK": "油尖旺區", 
                            "SSP": "深水埗區", "KC": "九龍城區", "WTS": "黃大仙區", "KT": "觀塘區", 
                            "TW": "荃灣區", "KwT": "葵青區", "N": "北區", "TP": "大埔區", 
                            "SK": "西貢區", "ST": "沙田區", "TM": "屯門區", "YL": "元朗區"
                        };

                        for (let i = 0; i < records.length; i++) {
                            const item = records[i];
                            const getVal = (tagName) => {
                                const el = item.getElementsByTagName(tagName)[0];
                                return el ? el.textContent.trim() : "";
                            };

                            const mapType = getVal("map_type");
                            if (mapType !== "toilet" && mapType !== "ap" && mapType !== "portable_toilet") continue; 

                            const coordinateStr = getVal("map_coordinate");
                            if (!coordinateStr) continue;
                            
                            const parts = coordinateStr.split(",");
                            const lat = parseFloat(parts[0]);
                            const lng = parseFloat(parts[1]);
                            
                            if (!isNaN(lat) && !isNaN(lng)) {
                                let typeName = "公廁";
                                if (mapType === "ap") typeName = "旱廁";
                                if (mapType === "portable_toilet") typeName = "流動廁所";

                                const rawDist = getVal("districtID");
                                const chineseDistrict = distMap[rawDist] || rawDist;

                                toiletData.push({
                                    id: 'gov_' + (getVal("mapID") || i),
                                    name: getVal("name_c"),
                                    address: getVal("address_c"),
                                    district: chineseDistrict, 
                                    lat: lat,
                                    lng: lng,
                                    accessible: false, 
                                    hours: getVal("openHr_c") || "24小時",
                                    type: typeName,
                                    babyCare: false,   
                                    remarks: getVal("remarks_c") !== "N/A" ? getVal("remarks_c") : "", 
                                    distance: null 
                                });
                            }
                        }
                    }
                }
            } catch (e) { console.warn("提示: 食環署 XML 公廁數據讀取或解析跳過:", e); }

            // === ⚙️ 引擎 3：安全載入康文署體育館 JSON (facility-sc.json) ===
            try {
                const lcsdResponse = await fetch('facility-sc.json');
                if (lcsdResponse.ok) {
                    const lcsdRaw = await lcsdResponse.json();
                    
                    lcsdRaw.forEach((item, index) => {
                        if (!item) return; 

                        // 🌟 終極經緯度清洗：完全適應大寫的 Latitude 和 Longitude
                        let rawLat = item.Latitude || item.lat || "";
                        let rawLng = item.Longitude || item.long || item.lng || "";
                        
                        let lat = parseFloat(typeof rawLat === 'string' ? rawLat.trim() : rawLat);
                        let lng = parseFloat(typeof rawLng === 'string' ? rawLng.trim() : rawLng);
                        
                        let chineseDistrict = (item.District_cn || "").trim();
                        if (chineseDistrict && !chineseDistrict.endsWith("區")) {
                            chineseDistrict = chineseDistrict + "區";
                        }
                        if (chineseDistrict === "油尖區") chineseDistrict = "油尖旺區";

                        const facText = item.Facilities_cn || item.Facilities_en || "";
                        const hasAccessible = facText.includes("無障礙") || facText.includes("暢通易達洗手間");
                        const hasBaby = facText.includes("育嬰") || facText.includes("哺乳");
                        
                        let cleanHours = "07:00 - 23:00";
                        let rawHours = item.Opening_hours_cn || item.Opening_hours_en;
                        if (rawHours && typeof rawHours === 'string') {
                            cleanHours = rawHours.replace(/<[^>]*>/g, '').replace(/[\r\n\t]/g, '').replace(/每日/g, '').trim();
                            if (cleanHours.length > 25) cleanHours = cleanHours.substring(0, 22) + "...";
                        }
                        if (!cleanHours || cleanHours.length < 3) cleanHours = "07:00 - 23:00";

                                id: 'lcsd_' + index,
                                name: (item.Name_cn || "體育館設施").trim(),
                                address: (item.Address_cn || "暫無詳細地址").trim(),
