<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>全港公廁、社區會堂及康體設施地圖</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { display: flex; flex-direction: column; height: 100vh; background-color: #f5f5f7; color: #1d1d1f; overflow: hidden; }
        
        /* Header 現代輕量設計 */
        .header { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 12px 20px; border-bottom: 1px solid rgba(0,0,0,0.08); z-index: 1000; box-shadow: 0 2px 15px rgba(0,0,0,0.02); }
        h1 { font-size: 1.25rem; font-weight: 600; text-align: center; margin-bottom: 10px; color: #1d1d1f; letter-spacing: -0.5px; }
        
        .search-container { position: relative; max-width: 600px; margin: 0 auto 10px auto; }
        .search-box { width: 100%; padding: 10px 50px 10px 15px; border: 1px solid rgba(0,0,0,0.1); border-radius: 12px; font-size: 0.95rem; background-color: rgba(0,0,0,0.03); transition: all 0.2s ease; outline: none; }
        .search-box:focus { background-color: #fff; border-color: #0071e3; box-shadow: 0 0 0 4px rgba(0,113,227,0.15); }
        
        /* Apple Maps 風格導航圓紐 */
        .geo-btn { 
            position: absolute; 
            right: 10px; 
            top: 50%; 
            transform: translateY(-50%); 
            background: #ffffff; 
            border: 1px solid rgba(0,0,0,0.12); 
            border-radius: 50%; 
            width: 32px; 
            height: 32px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            cursor: pointer; 
            box-shadow: 0 2px 6px rgba(0,0,0,0.08); 
            transition: all 0.2s ease; 
            outline: none; 
            z-index: 5;
        }
        .geo-btn:active { 
            transform: translateY(-50%) scale(0.9); 
            background-color: #f5f5f7; 
        }
        .geo-btn svg {
            width: 16px;
            height: 16px;
            fill: #0071e3;
        }
        
        .suggestion-box { position: absolute; top: 100%; left: 0; right: 0; background: #fff; border: 1px solid rgba(0,0,0,0.1); border-radius: 12px; margin-top: 5px; max-height: 200px; overflow-y: auto; z-index: 2000; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: none; }
        .suggestion-item { padding: 10px 15px; cursor: pointer; border-bottom: 1px solid rgba(0,0,0,0.05); font-size: 0.9rem; }
        .suggestion-item:hover { background-color: rgba(0,113,227,0.05); }

        .filter-panel { display: flex; flex-direction: column; gap: 8px; max-width: 900px; margin: 0 auto; }
        .filter-row { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; align-items: center; }
        
        .type-btn { padding: 6px 14px; border: none; border-radius: 20px; font-size: 0.85rem; font-weight: 500; cursor: pointer; background-color: rgba(0,0,0,0.04); color: #515154; transition: all 0.2s ease; }
        .type-btn:hover { background-color: rgba(0,0,0,0.08); }
        .type-btn.active { background-color: #0071e3; color: #fff; }
        
        /* 推薦特製按鈕樣式 */
        .type-btn.recommend-btn { background-color: rgba(255, 149, 0, 0.1); color: #ff9500; }
        .type-btn.recommend-btn.active { background-color: #ff9500; color: #fff; }

        select { padding: 6px 12px; border: 1px solid rgba(0,0,0,0.1); border-radius: 20px; font-size: 0.85rem; background-color: #fff; color: #1d1d1f; outline: none; cursor: pointer; }
        
        .checkbox-label { display: flex; align-items: center; gap: 4px; font-size: 0.85rem; color: #515154; cursor: pointer; background: rgba(0,0,0,0.04); padding: 6px 12px; border-radius: 20px; }
        .checkbox-label input { cursor: pointer; width: 14px; height: 14px; }

        .action-btn { background-color: #34c759; color: #fff; border: none; padding: 6px 14px; border-radius: 20px; font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: background 0.2s; }
        .action-btn:hover { background-color: #28a745; }
        
        .result-count { text-align: center; font-size: 0.8rem; color: #86868b; margin-top: 6px; font-weight: 500; }
        
        /* 主體佈局 */
        .main-container { display: flex; flex: 1; position: relative; overflow: hidden; }
        
        /* 固定列表 (Desktop 樣式) */
        .sidebar { width: 380px; background: #fff; border-right: 1px solid rgba(0,0,0,0.08); display: flex; flex-direction: column; z-index: 10; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .sidebar-header { padding: 14px 15px; background: #f5f5f7; border-bottom: 1px solid rgba(0,0,0,0.05); font-size: 0.9rem; font-weight: 600; color: #1d1d1f; display: flex; justify-content: space-between; align-items: center; }
        .list-container { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        
        /* 列表卡片樣式 */
        .facility-item { padding: 14px 15px; border-bottom: 1px solid rgba(0,0,0,0.04); cursor: pointer; transition: background 0.2s; display: flex; flex-direction: column; gap: 5px; }
        .facility-item:hover { background: rgba(0,113,227,0.02); }
        .facility-item.selected { background: rgba(0,113,227,0.06); border-left: 4px solid #0071e3; padding-left: 11px; }
        .item-title-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
        .item-title { font-weight: 600; font-size: 0.95rem; color: #1d1d1f; display: flex; align-items: center; flex-wrap: wrap; gap: 4px; }
        .item-distance { font-size: 0.8rem; font-weight: 600; color: #0071e3; white-space: nowrap; }
        .item-address { font-size: 0.8rem; color: #86868b; line-height: 1.4; }
        
        /* 推薦標籤 & 樓層亮標 */
        .recommend-badge { background-color: #34c759; color: white; padding: 1px 6px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; display: inline-flex; align-items: center; gap: 2px; }
        .floor-badge { background-color: #ff9500; color: white; padding: 1px 5px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; display: inline-block; }
        
        .item-meta { display: flex; gap: 4px; margin-top: 2px; flex-wrap: wrap; }
        
        /* 地圖區塊 */
        #map { flex: 1; height: 100%; z-index: 1; background-color: #f5f5f7; }
        
        /* 自訂高清 Marker */
        .map-custom-marker { display: flex; justify-content: center; align-items: center; border-radius: 50%; border: 2px solid #fff; box-shadow: 0 3px 8px rgba(0,0,0,0.25); color: white; font-size: 12px; font-weight: bold; width: 30px !important; height: 30px !important; }
        .map-custom-marker.recommended { border: 2.5px solid #ff9500; box-shadow: 0 0 12px rgba(255, 149, 0, 0.6); }

        /* Popup 彈窗美化 */
        .custom-popup { font-size: 0.9rem; line-height: 1.4; color: #1d1d1f; padding: 2px; min-width: 220px; }
        .popup-title { font-weight: 600; font-size: 1rem; margin-bottom: 6px; border-bottom: 1px solid #eee; padding-bottom: 4px; display: flex; align-items: center; flex-wrap: wrap; gap: 4px; }
        .popup-text { margin-bottom: 4px; font-size: 0.85rem; color: #515154; }
        .popup-badge-container { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
        .popup-badge { font-size: 0.7rem; padding: 2px 6px; border-radius: 6px; font-weight: 500; background: #f5f5f7; border: 1px solid #e2e2e7; }
        .badge-accessible { background-color: #e3f2fd; color: #0d47a1; border-color: #bbdefb; }
        .badge-baby { background-color: #fce4ec; color: #880e4f; border-color: #f8bbd0; }
        .popup-route-btn { display: block; margin-top: 8px; background: #0071e3; color: #fff !important; text-decoration: none; padding: 7px; border-radius: 6px; font-weight: 500; font-size: 0.8rem; text-align: center; border: none; cursor: pointer; width: 100%; }

        /* 手機版抽屜切換鈕 */
        .drawer-toggle { display: none; padding: 2px 8px; background: #0071e3; color: white; border: none; border-radius: 6px; font-size: 0.75rem; cursor: pointer; }

        /* 📱 Mobile 抽屜響應式樣式 */
        @media (max-width: 768px) {
            .header { padding: 8px 12px; }
            h1 { font-size: 1.1rem; margin-bottom: 6px; }
            .search-box { padding: 8px 45px 8px 12px; font-size: 0.9rem; }
            .filter-panel { gap: 4px; }
            .type-btn, select, .checkbox-label, .action-btn { padding: 5px 10px; font-size: 0.75rem; border-radius: 15px; }
            
            .main-container { flex-direction: column; }
            
            .sidebar { width: 100%; height: 40vh; border-right: none; border-top: 1px solid rgba(0,0,0,0.12); box-shadow: 0 -4px 20px rgba(0,0,0,0.08); position: absolute; bottom: 0; left: 0; transition: transform 0.3s ease; transform: translateY(0); }
            .sidebar.collapsed { transform: translateY(calc(40vh - 40px)); }
            
            .sidebar-header { padding: 10px 15px; background: #fff; position: relative; cursor: pointer; height: 40px; }
            .sidebar-header::before { content: ''; width: 40px; height: 4px; background: #d2d2d7; border-radius: 2px; position: absolute; top: 4px; left: 50%; transform: translateX(-50%); }
            .drawer-toggle { display: block; }
            
            .list-container { height: calc(40vh - 40px); }
            .facility-item { padding: 12px 15px; }
            .item-title { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>全港公廁、社區會堂及康體設施</h1>
        
        <div class="search-container">
            <input type="text" id="searchKeyword" class="search-box" placeholder="輸入設施名稱、地址或樓層搜尋 (如: 9樓)..." autocomplete="off">
            <button class="geo-btn" id="geoBtn" title="定位目前位置">
                <svg viewBox="0 0 24 24">
                    <path d="M12 2L2 22l10-4 10 4L12 2z"/>
                </svg>
            </button>
            <div id="suggestionBox" class="suggestion-box"></div>
        </div>

        <div class="filter-panel">
            <div class="filter-row" id="typeFilterGroup">
                <button class="type-btn active" data-type="ALL">🌍 全部顯示</button>
                <button class="type-btn recommend-btn" data-type="RECOMMEND">🌟 只看推薦</button>
                <button class="type-btn" data-type="公廁">🚽 公廁</button>
                <button class="type-btn" data-type="流動便溺設施">🚚 流動便溺</button>
                <button class="type-btn" data-type="商場及社區設施">🏛️ 商場/社區會堂</button>
                <button class="type-btn" data-type="體育館">🏟️ 體育館</button>
            </div>
            <div class="filter-row">
                <select id="districtFilter">
                    <option value="ALL">📍 全港所有地區</option>
                    <option value="中西區">中西區</option>
                    <option value="灣仔區">灣仔區</option>
                    <option value="東區">東區</option>
                    <option value="南區">南區</option>
                    <option value="油尖旺區">油尖旺區</option>
                    <option value="深水埗區">深水埗區</option>
                    <option value="九龍城區">九龍城區</option>
                    <option value="黃大仙區">黃大仙區</option>
                    <option value="觀塘區">觀塘區</option>
                    <option value="葵青區">葵青區</option>
                    <option value="荃灣區">荃灣區</option>
                    <option value="屯門區">屯門區</option>
                    <option value="元朗區">元朗區</option>
                    <option value="北區">北區</option>
                    <option value="大埔區">大埔區</option>
                    <option value="沙田區">沙田區</option>
                    <option value="西貢區">西貢區</option>
                    <option value="離島區">離島區</option>
                </select>

                <label class="checkbox-label"><input type="checkbox" id="accessibleFilter"> ♿ 無障礙</label>
                <label class="checkbox-label"><input type="checkbox" id="twentyFourFilter"> 🕒 24H</label>
                <label class="checkbox-label"><input type="checkbox" id="babyCareFilter"> 🍼 育嬰室</label>
                <button class="action-btn" id="closestBtn">🏃 找最近設施</button>
            </div>
        </div>
        <div class="result-count" id="resultCount">正在下載數據引擎...</div>
    </div>

    <div class="main-container">
        <div class="sidebar" id="sidebarPanel">
            <div class="sidebar-header" id="sidebarHeader">
                <span id="sidebarTitle">設施列表</span>
                <button class="drawer-toggle" id="drawerToggleBtn">展開/收起</button>
            </div>
            <div class="list-container" id="listContainer"></div>
        </div>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

    <script>
        let map;
        let markersLayer;
        let toiletData = []; 
        let selectedType = 'ALL';
        let userLocation = null;
        let userMarker = null;
        let routingControl = null;

        // 🌟 核心硬編碼：定義獲得網民/金廁所獎高度推薦的關鍵關鍵字與名單
        const recommendedKeywords = [
            "蘭桂坊", "中山紀念公園", "天水圍社區會堂", "屯門市廣場", "希慎廣場", "圓方", 
            "K11", "海港城", "太古廣場", "IFC", "朗豪坊", "M+", "香港故宮", "大館"
        ];

        const styleConfig = {
            '公廁': { color: '#34c759', icon: '🚽' },
            '流動便溺設施': { color: '#ff9500', icon: '🚚' },
            '商場及社區設施': { color: '#0071e3', icon: '🏛️' },
            '體育館': { color: '#af52de', icon: '🏟️' }
        };

        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([22.3193, 114.1694], 12);
            L.control.zoom({ position: 'bottomright' }).addTo(map);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap contributors',
                maxZoom: 19
            }).addTo(map);

            markersLayer = L.layerGroup().addTo(map);
        }

        // 坐標自動校正引擎
        function parseCoordinate(coordStr) {
            if (!coordStr) return 0;
            const str = String(coordStr).trim();
            
            if (str.includes('-')) {
                const parts = str.split('-');
                const d = parseFloat(parts[0]) || 0;
                const m = parseFloat(parts[1]) || 0;
                const s = parseFloat(parts[2]) || 0;
                return d + (m / 60) + (s / 3600); 
            }
            return parseFloat(str); 
        }

        function extractFloor(address, name) {
            const match = address.match(/(\d+\s*樓|\d+\s*貴|\d+\/F|地下|平台|閣樓)/i) || name.match(/(\d+\s*樓|\d+\s*貴|\d+\/F|地下|平台|閣樓)/i);
            return match ? match[0] : null;
        }

        // 判斷是否為值得推薦的優質廁所
        function checkIsRecommended(name, type, hasBabyCare) {
            // 邏輯 A：名字內含有知名優質商場、金廁所獎得主關鍵字
            for (let kw of recommendedKeywords) {
                if (name.includes(kw)) return true;
            }
            // 邏輯 B：如果非流動廁所，且同時具備育嬰室與無障礙設施，通常環境較佳，也給予推薦
            if (type === "商場及社區設施" && hasBabyCare) return true;
            return false;
        }

        async function fetchToiletData() {
            toiletData = []; 
            const districtMap = {
                'CW': '中西區', 'E': '東區', 'S': '南區', 'Wch': '灣仔區', 'Is': '離島區',
                'YT': '油尖旺區', 'MK': '油尖旺區', 'YTM': '油尖旺區', 'SSP': '深水埗區', 
                'KC': '九龍城區', 'WTS': '黃大仙區', 'KT': '觀塘區', 'TW': '荃灣區', 
                'KwT': '葵青區', 'N': '北區', 'TP': '大埔區', 'SK': '西貢區', 
                'ST': '沙田區', 'TM': '屯門區', 'YL': '元朗區'
            };

            // 引擎 1：toilets.xml
            try {
                const xmlResponse = await fetch('toilets.xml');
                if (xmlResponse.ok) {
                    const xmlText = await xmlResponse.text();
                    const parser = new DOMParser();
                    const xmlDoc = parser.parseFromString(xmlText, 'text/xml');
                    const maps = xmlDoc.getElementsByTagName('map');

                    for (let i = 0; i < maps.length; i++) {
                        const mapNode = maps[i];
                        const type = mapNode.getElementsByTagName('map_type')[0]?.textContent || '';
                        let finalType = "公廁";
                        if (type === "mobile_toilet" || type === "portable_toilet") finalType = "流動便溺設施";
                        else if (type === "mall") finalType = "商場及社區設施";

                        const coordText = mapNode.getElementsByTagName('map_coordinate')[0]?.textContent || '';
                        const coords = coordText.split(',');
                        const lat = parseFloat(coords[0]);
                        const lng = parseFloat(coords[1]);
                        const xmlDistrictRaw = (mapNode.getElementsByTagName('districtID')[0]?.textContent || '').trim();
                        const finalDistrict = districtMap[xmlDistrictRaw] || xmlDistrictRaw || "其他";

                        if (!isNaN(lat) && !isNaN(lng)) {
                            const addr = (mapNode.getElementsByTagName('address_c')[0]?.textContent || "暫無地址").trim();
                            const nm = (mapNode.getElementsByTagName('name_c')[0]?.textContent || "未命名設施").trim();
                            const baby = mapNode.getElementsByTagName('baby_care')[0]?.textContent === "Yes";
                            
                            toiletData.push({
                                id: 'xml_' + (mapNode.getElementsByTagName('mapID')[0]?.textContent || i),
                                name: nm, address: addr, district: finalDistrict, lat: lat, lng: lng,
                                accessible: mapNode.getElementsByTagName('barrier_free')[0]?.textContent === "Yes",
                                hours: mapNode.getElementsByTagName('openHr_c')[0]?.textContent || "24小時",
                                type: finalType, babyCare: baby,
                                remarks: (mapNode.getElementsByTagName('remarks_c')[0]?.textContent || "").trim(),
                                floor: extractFloor(addr, nm), distance: null,
                                isRecommended: checkIsRecommended(nm, finalType, baby)
                            });
                        }
                    }
                }
            } catch (e) { console.warn("toilets.xml 跳過", e); }

            // 引擎 2：facility-sc.json
            try {
                const gymResponse = await fetch('facility-sc.json'); 
                if (gymResponse.ok) {
                    const gymRaw = await gymResponse.json();
                    if (Array.isArray(gymRaw)) {
                        gymRaw.forEach((item, index) => {
                            if (!item) return;
                            let lat = parseCoordinate(item.Latitude);
                            let lng = parseCoordinate(item.Longitude);
                            let hasBabyCare = item.Facilities_cn && (String(item.Facilities_cn).includes("育嬰") || String(item.Facilities_cn).includes("嬰兒"));
                            
                            if (lat && lng && !isNaN(lat) && !isNaN(lng)) {
                                const addr = (item.Address_cn || "暫無地址").trim();
                                const nm = (item.Name_cn || "未命名體育館").trim();
                                toiletData.push({
                                    id: 'gym_' + index, name: nm, address: addr, district: (item.District_cn || "其他").trim(),
                                    lat: lat, lng: lng, accessible: true, hours: item.Opening_hours_cn ? item.Opening_hours_cn.replace(/<\/?[^>]+(>|$)/g, "") : "07:00 - 23:00", 
                                    type: "體育館", babyCare: hasBabyCare, remarks: item.Facilities_cn ? "附設: " + item.Facilities_cn.replace(/<\/?[^>]+(>|$)/g, "").substring(0, 60) + "..." : "", 
                                    floor: extractFloor(addr, nm), distance: null,
                                    isRecommended: checkIsRecommended(nm, "體育館", hasBabyCare)
                                });
                            }
                        });
                    }
                }
            } catch (e) { console.error("體育館數據錯誤", e); }

            // 引擎 3：toilets.json
            try {
                const jsonResponse = await fetch('toilets.json');
                if (jsonResponse.ok) {
                    const jsonRaw = await jsonResponse.json();
                    if (Array.isArray(jsonRaw)) {
                        jsonRaw.forEach((item, index) => {
                            if (!item || item.Type === "公廁" || item.Type === "體育館") return;
                            const lat = parseFloat(item.Latitude);
                            const lng = parseFloat(item.Longitude);
                            if (!isNaN(lat) && !isNaN(lng)) {
                                const addr = (item.Address_tc || "暫無地址").trim();
                                const nm = (item.Name_tc || "未命名設施").trim();
                                const baby = item.Baby_care === "設有";
                                toiletData.push({
                                    id: 'mall_' + index, name: nm, address: addr, district: (item.District_tc || "其他").trim(),
                                    lat: lat, lng: lng, accessible: item.Barrier_free_access === "Yes" || item.Barrier_free_access === "設有",
                                    hours: item.Opening_hours_tc || "10:00 - 22:00", type: "商場及社區設施", babyCare: baby,
                                    remarks: item.Type ? "大樓類型: " + item.Type : "", floor: extractFloor(addr, nm), distance: null,
                                    isRecommended: checkIsRecommended(nm, "商場及社區設施", baby)
                                });
                            }
                        });
                    }
                }
            } catch (e) { console.warn("toilets.json 跳過", e); }

            filterData();
        }

        function filterData() {
            markersLayer.clearLayers();

            const district = document.getElementById('districtFilter').value;
            const isAccessible = document.getElementById('accessibleFilter').checked;
            const is24Hours = document.getElementById('twentyFourFilter').checked;
            const isBabyCare = document.getElementById('babyCareFilter').checked;
            const keyword = document.getElementById('searchKeyword').value.trim().toLowerCase();

            if (userLocation) {
                toiletData.forEach(item => {
                    item.distance = calculateDistance(userLocation.lat, userLocation.lng, item.lat, item.lng);
                });
            }

            let filtered = toiletData.filter(item => {
                // 處理篩選按鈕：如果是選「只看推薦」，過濾非推薦項目
                if (selectedType === 'RECOMMEND') {
                    if (!item.isRecommended) return false;
                } else if (selectedType !== 'ALL' && item.type !== selectedType) {
                    return false;
                }
                
                if (district !== 'ALL' && item.district !== district) return false;
                if (isAccessible && !item.accessible) return false;
                if (is24Hours && !item.hours.includes('24') && !item.hours.includes('二十四')) return false;
                if (isBabyCare && !item.babyCare) return false;
                if (keyword && !item.name.toLowerCase().includes(keyword) && !item.address.toLowerCase().includes(keyword) && !(item.floor && item.floor.toLowerCase().includes(keyword))) return false;
                return true;
            });

            if (userLocation) {
                filtered.sort((a, b) => (a.distance || 0) - (b.distance || 0));
            }

            const listContainer = document.getElementById('listContainer');
            listContainer.innerHTML = ''; 

            filtered.forEach(item => {
                const config = styleConfig[item.type] || { color: '#666', icon: '📍' };
                const isCommunity = item.remarks.includes("社區會堂") || item.remarks.includes("社區中心") || item.name.includes("社區會堂");
                const finalLabel = isCommunity ? '🏛️' : config.icon;

                // 建立推薦和樓層標籤 HTML
                const recommendBadgeHtml = item.isRecommended ? `<span class="recommend-badge">👍 推薦</span>` : '';
                const floorBadgeHtml = item.floor ? `<span class="floor-badge">📍 ${item.floor}</span>` : '';

                // 1. 地圖 Marker 渲染
                const markerClass = item.isRecommended ? 'map-custom-marker recommended' : 'map-custom-marker';
                const customIcon = L.divIcon({
                    html: `<div class="${markerClass}" style="background-color: ${item.isRecommended ? '#ff9500' : config.color};">${finalLabel}</div>`,
                    className: 'leaflet-custom-divicon',
                    iconSize: [30, 30],
                    iconAnchor: [15, 15]
                });

                let popupContent = `
                    <div class="custom-popup">
                        <div class="popup-title">${finalLabel} ${item.name} ${recommendBadgeHtml} ${floorBadgeHtml}</div>
                        <div class="popup-text">📍 地址: ${item.address}</div>
                        <div class="popup-text">🕒 開放: ${item.hours}</div>
                `;
                if(item.remarks) popupContent += `<div class="popup-text" style="color:#e03e2d; font-weight:500;">ℹ️ ${item.remarks}</div>`;
                if (item.distance !== null) popupContent += `<div class="popup-text" style="color:#0071e3; font-weight:600;">🏃 距離: ${item.distance.toFixed(0)} 米</div>`;
                
                popupContent += `<div class="popup-badge-container">`;
                if (item.accessible) popupContent += `<span class="popup-badge badge-accessible">♿ 無障礙</span>`;
                if (item.babyCare) popupContent += `<span class="popup-badge badge-baby">🍼 育嬰室</span>`;
                popupContent += `</div>`;
                popupContent += `<button class="popup-route-btn" onclick="startRouting(${item.lat}, ${item.lng})">🗺️ 規劃步行路線</button></div>`;

                const marker = L.marker([item.lat, item.lng], { icon: customIcon }).bindPopup(popupContent, { maxWidth: 260 });
                markersLayer.addLayer(marker);

                // 2. 同步左側列表卡片
                const itemDiv = document.createElement('div');
                itemDiv.className = 'facility-item';
                const distanceStr = item.distance !== null ? (item.distance > 1000 ? `${(item.distance/1000).toFixed(1)} km` : `${item.distance.toFixed(0)} m`) : '';

                itemDiv.innerHTML = `
                    <div class="item-title-row">
                        <div class="item-title">${finalLabel} ${item.name} ${recommendBadgeHtml} ${floorBadgeHtml}</div>
                        ${distanceStr ? `<div class="item-distance">${distanceStr}</div>` : ''}
                    </div>
                    <div class="item-address">${item.address}</div>
                    <div class="item-meta">
                        <span class="popup-badge">${isCommunity ? "社區設施" : item.type}</span>
                        ${item.accessible ? '<span class="popup-badge badge-accessible">♿</span>' : ''}
                        ${item.babyCare ? '<span class="popup-badge badge-baby">🍼</span>' : ''}
                    </div>
                `;

                itemDiv.addEventListener('click', () => {
                    document.querySelectorAll('.facility-item').forEach(el => el.classList.remove('selected'));
                    itemDiv.classList.add('selected');
                    
                    map.flyTo([item.lat, item.lng], 16, { animate: true, duration: 1 });
                    setTimeout(() => { marker.openPopup(); }, 800);

                    if (window.innerWidth <= 768) {
                        document.getElementById('sidebarPanel').classList.add('collapsed');
                    }
                });

                listContainer.appendChild(itemDiv);
            });

            document.getElementById('sidebarTitle').innerText = `設施列表 (${filtered.length})`;
            document.getElementById('resultCount').innerText = `已為您篩選出 ${filtered.length} 個符合條件的設施地點`;
        }

        function calculateDistance(lat1, lng1, lat2, lng2) {
            const R = 6371e3; 
            const phi1 = lat1 * Math.PI / 180, phi2 = lat2 * Math.PI / 180;
            const dPhi = (lat2 - lat1) * Math.PI / 180, dLambda = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dPhi/2) * Math.sin(dPhi/2) + Math.cos(phi1) * Math.cos(phi2) * Math.sin(dLambda/2) * Math.sin(dLambda/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        function getLiveLocation(callback = null) {
            if (!navigator.geolocation) { alert("您的瀏覽器不支援 GPS 定位。"); return; }
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    userLocation = { lat: position.coords.latitude, lng: position.coords.longitude };
                    if (userMarker) map.removeLayer(userMarker);

                    const userIcon = L.divIcon({
                        html: `<div style="background-color: #0071e3; width: 16px; height: 16px; border-radius: 50%; border: 3px solid white; box-shadow: 0 0 10px #0071e3;"></div>`,
                        className: 'user-marker', iconSize: [16, 16], iconAnchor: [8, 8]
                    });

                    userMarker = L.marker([userLocation.lat, userLocation.lng], { icon: userIcon }).addTo(map).bindPopup("👋 您目前的位置").openPopup();
                    map.setView([userLocation.lat, userLocation.lng], 15);
                    filterData();
                    if (callback) callback();
                },
                () => { alert("請在手機/瀏覽器設定中允許此網頁獲取定位權限。"); },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        }

        function findClosestToilet() {
            getLiveLocation(() => {
                const firstItem = document.querySelector('.facility-item');
                if (firstItem) {
                    document.getElementById('sidebarPanel').classList.remove('collapsed');
                    firstItem.click();
                } else {
                    alert("找不到任何合適的地點。");
                }
            });
        }

        function startRouting(destLat, destLng) {
            if (!userLocation) { alert("請先點擊導航按鈕定位目前位置以開啟導航！"); return; }
            if (routingControl) map.removeControl(routingControl);

            routingControl = L.Routing.control({
                waypoints: [L.latLng(userLocation.lat, userLocation.lng), L.latLng(destLat, destLng)],
                router: L.Routing.osrmv1({ serviceUrl: 'https://router.project-osrm.org/route/v1', profile: 'foot' }),
                lineOptions: { styles: [{ color: '#0071e3', opacity: 0.8, weight: 6 }] },
                createMarker: () => null, 
                addWaypoints: false, fitSelectedRoutes: true, show: false 
            }).addTo(map);
            map.closePopup();
        }

        function handleSearchSuggestions() {
            const input = document.getElementById('searchKeyword').value.trim().toLowerCase();
            const box = document.getElementById('suggestionBox');
            if (!input) { box.style.display = 'none'; return; }

            let matches = toiletData.filter(item => item.name.toLowerCase().includes(input) || item.address.toLowerCase().includes(input)).slice(0, 5);
            if (matches.length === 0) { box.style.display = 'none'; return; }

            box.innerHTML = '';
            matches.forEach(item => {
                const div = document.createElement('div');
                div.className = 'suggestion-item';
                div.innerText = `${item.name} ${item.floor ? `(${item.floor})` : ''}`;
                div.addEventListener('click', () => {
                    document.getElementById('searchKeyword').value = item.name;
                    box.style.display = 'none';
                    filterData();
                    
                    const firstCard = document.querySelector('.facility-item');
                    if (firstCard) firstCard.click();
                });
                box.appendChild(div);
            });
            box.style.display = 'block';
        }

        document.getElementById('sidebarHeader').addEventListener('click', () => {
            if (window.innerWidth <= 768) {
                document.getElementById('sidebarPanel').classList.toggle('collapsed');
            }
        });

        document.getElementById('typeFilterGroup').addEventListener('click', (e) => {
            if (e.target.classList.contains('type-btn')) {
                document.querySelectorAll('.type-btn').forEach(btn => btn.classList.remove('active'));
                e.target.classList.add('active');
                selectedType = e.target.getAttribute('data-type');
                filterData();
            }
        });

        document.getElementById('searchKeyword').addEventListener('input', () => { handleSearchSuggestions(); filterData(); });
        document.addEventListener('click', (e) => { if (!e.target.closest('.search-container')) document.getElementById('suggestionBox').style.display = 'none'; });
        document.getElementById('districtFilter').addEventListener('change', filterData);
        document.getElementById('accessibleFilter').addEventListener('change', filterData);
        document.getElementById('twentyFourFilter').addEventListener('change', filterData);
        document.getElementById('babyCareFilter').addEventListener('change', filterData);
        document.getElementById('geoBtn').addEventListener('click', () => getLiveLocation());
        document.getElementById('closestBtn').addEventListener('click', findClosestToilet);

        window.onload = () => { initMap(); fetchToiletData(); };
    </script>
</body>
</html>
