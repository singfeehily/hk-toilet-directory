<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全港公廁、商場及體育館設施地圖</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { display: flex; flex-direction: column; height: 100vh; background-color: #f5f5f7; color: #1d1d1f; }
        
        .header { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 15px 20px; border-bottom: 1px solid rgba(0,0,0,0.1); z-index: 1000; box-shadow: 0 4px 30px rgba(0,0,0,0.03); }
        h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; color: #000; }
        
        .filter-section { display: flex; flex-direction: column; gap: 10px; }
        .search-row { display: flex; gap: 10px; width: 100%; }
        .search-container { position: relative; flex: 1; }
        
        input[type="text"], select { width: 100%; padding: 10px 14px; border: 1px solid #d2d2d7; border-radius: 10px; font-size: 0.95rem; background-color: #fff; color: #1d1d1f; transition: all 0.2s ease; -webkit-appearance: none; }
        input[type="text"]:focus, select:focus { border-color: #007aff; outline: none; box-shadow: 0 0 0 4px rgba(0,122,255,0.15); }
        
        .suggestion-box { position: absolute; top: calc(100% + 5px); left: 0; right: 0; background: white; border: 1px solid #d2d2d7; border-radius: 10px; max-height: 240px; overflow-y: auto; z-index: 2000; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: none; }
        .suggestion-item { padding: 12px 15px; cursor: pointer; border-bottom: 1px solid #f5f5f7; display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; }
        .suggestion-item:last-child { border-bottom: none; }
        .suggestion-item:hover { background-color: #f5f5f7; }
        .suggestion-item .sub-text { color: #86868b; font-size: 0.8rem; }
        
        .filter-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
        .filter-row::-webkit-scrollbar { display: none; }
        
        .type-pill { background: #e8e8ed; color: #1d1d1f; padding: 8px 16px; border-radius: 20px; font-size: 0.88rem; font-weight: 500; cursor: pointer; white-space: nowrap; border: none; transition: all 0.2s ease; }
        .type-pill.active { background: #000; color: #fff; }
        
        .checkbox-group { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 5px; }
        .checkbox-label { display: flex; align-items: center; gap: 6px; font-size: 0.85rem; color: #515154; cursor: pointer; background: #fff; padding: 6px 12px; border-radius: 8px; border: 1px solid #e8e8ed; }
        .checkbox-label input { width: 16px; height: 16px; accent-color: #007aff; }
        
        .action-row { display: flex; gap: 8px; margin-top: 5px; }
        .btn { flex: 1; padding: 10px; border-radius: 10px; border: none; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .btn-primary { background: #007aff; color: white; }
        .btn-primary:hover { background: #002580; }
        .btn-secondary { background: #34c759; color: white; }
        .btn-secondary:hover { background: #1fa341; }
        
        .status-bar { background: #e8e8ed; color: #515154; padding: 6px 20px; font-size: 0.8rem; font-weight: 500; border-bottom: 1px solid rgba(0,0,0,0.05); }
        
        .main-container { display: flex; flex: 1; overflow: hidden; position: relative; }
        #map { flex: 1; height: 100%; }
        
        .sidebar { width: 360px; height: 100%; background: #fff; border-right: 1px solid rgba(0,0,0,0.1); overflow-y: auto; display: flex; flex-direction: column; z-index: 999; box-shadow: 4px 0 30px rgba(0,0,0,0.02); }
        .list-container { padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        
        .toilet-card { background: #f5f5f7; border-radius: 14px; padding: 16px; cursor: pointer; transition: all 0.2s ease; border: 1px solid transparent; position: relative; }
        .toilet-card:hover { background: #fff; border-color: #007aff; box-shadow: 0 8px 24px rgba(0,122,255,0.08); transform: translateY(-2px); }
        .toilet-card h3 { font-size: 1.05rem; font-weight: 600; margin-bottom: 6px; padding-right: 55px; color: #000; }
        .toilet-card p { font-size: 0.85rem; color: #515154; margin-bottom: 8px; line-height: 1.4; }
        
        .tag-group { display: flex; gap: 6px; flex-wrap: wrap; }
        .tag { font-size: 0.75rem; padding: 4px 8px; border-radius: 6px; background: #e8e8ed; color: #515154; font-weight: 500; }
        .type-gov { background: rgba(0,122,255,0.1); color: #007aff; }
        .type-mall { background: rgba(255,45,85,0.1); color: #ff2d55; }
        .type-sport { background: rgba(175,82,222,0.1); color: #af52de; }
        .type-hall { background: rgba(16,124,65,0.1); color: #107c41; }
        .active-tag { background: #007aff; color: #fff; }
        .baby-tag { background: #ff9500; color: #fff; }
        
        .distance-badge { position: absolute; top: 16px; right: 16px; background: #000; color: #fff; padding: 4px 8px; border-radius: 8px; font-size: 0.75rem; font-weight: 700; }
        .route-btn { background: #34c759; color: white; border: none; padding: 6px 12px; border-radius: 8px; font-size: 0.8rem; font-weight: 600; cursor: pointer; margin-top: 10px; width: 100%; display: inline-block; text-align: center; }
        
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 3000; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; backdrop-filter: blur(5px); }
        .modal.active { opacity: 1; pointer-events: auto; }
        .modal-content { background: white; padding: 24px; border-radius: 20px; width: 90%; max-width: 340px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.15); }
        .modal-content h3 { font-size: 1.2rem; margin-bottom: 10px; }
        .modal-content p { font-size: 0.9rem; color: #515154; margin-bottom: 20px; line-height: 1.4; }
        .modal-btns { display: flex; gap: 10px; }
        .modal-btn { flex: 1; padding: 12px; border-radius: 10px; border: none; font-size: 0.95rem; font-weight: 600; cursor: pointer; }
        
        .leaflet-routing-container { display: none !important; }

        @media (max-width: 768px) {
            body { height: auto; min-height: 100vh; }
            .main-container { flex-direction: column-reverse; height: calc(100vh - 180px); }
            .sidebar { width: 100%; height: 50%; border-right: none; border-top: 1px solid rgba(0,0,0,0.1); }
            #map { height: 50%; width: 100%; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🚽 全港公廁及社區設施智能地圖</h1>
        <div class="filter-section">
            <div class="search-row">
                <div class="search-container">
                    <input type="text" id="searchKeyword" placeholder="搜尋名稱、街道或大廈名稱...">
                    <div class="suggestion-box" id="suggestionBox"></div>
                </div>
                <div style="width: 130px;">
                    <select id="districtFilter">
                        <option value="">全部地區</option>
                        <option value="中西區">中西區</option>
                        <option value="灣仔區">灣仔區</option>
                        <option value="東區">東區</option>
                        <option value="南區">南區</option>
                        <option value="油尖旺區">油尖旺區</option>
                        <option value="深水埗區">深水埗區</option>
                        <option value="九龍城區">九龍城區</option>
                        <option value="黃大仙區">黃大仙區</option>
                        <option value="觀塘區">觀塘區</option>
                        <option value="荃灣區">荃灣區</option>
                        <option value="屯門區">屯門區</option>
                        <option value="元朗區">元朗區</option>
                        <option value="北區">北區</option>
                        <option value="大埔區">大埔區</option>
                        <option value="沙田區">沙田區</option>
                        <option value="西貢區">西貢區</option>
                        <option value="離島區">離島區</option>
                        <option value="葵青區">葵青區</option>
                    </select>
                </div>
            </div>
            
            <div class="filter-row" id="typeFilterGroup">
                <button class="type-pill active" data-type="all">✨ 全部設施</button>
                <button class="type-pill" data-type="公廁">🔵 官方公廁</button>
                <button class="type-pill" data-type="商場">🔴 私人商場</button>
                <button class="type-pill" data-type="體育館">🟣 LCSD體育館</button>
                <button class="type-pill" data-type="社區會堂">🟢 社區會堂</button>
                <button class="type-pill" data-type="流動廁所">🚚 流動便溺設施</button>
            </div>

            <div class="checkbox-group">
                <label class="checkbox-label"><input type="checkbox" id="accessibleFilter">♿ 暢通易達 (無障礙)</label>
                <label class="checkbox-label"><input type="checkbox" id="twentyFourFilter">⏰ 24小時開放</label>
                <label class="checkbox-label"><input type="checkbox" id="babyCareFilter">🍼 設有育嬰室</label>
            </div>

            <div class="action-row">
                <button class="btn btn-primary" id="geoBtn">📍 定位我的位置</button>
                <button class="btn btn-secondary" id="closestBtn">🏃 搵最近嘅設施</button>
            </div>
        </div>
    </div>

    <div class="status-bar" id="resultCount">正在初始化地圖與下載數據引擎...</div>

    <div class="main-container">
        <div class="sidebar">
            <div class="list-container" id="toiletList"></div>
        </div>
        <div id="map"></div>
    </div>

    <div class="modal" id="geoModal">
        <div class="modal-content">
            <h3>開啟 GPS 定位導航</h3>
            <p>本功能需要使用您的實時 GPS 坐標，以便在地圖上標記您的位置、計算步程距離並規劃導航路線。</p>
            <div class="modal-btns">
                <button class="modal-btn" id="modalCancelBtn" style="background:#e8e8ed;">拒絕</button>
                <button class="modal-btn" id="modalEnableBtn" style="background:#34c759; color:white;">允許定位</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

    <script>
        let map;
        let markersGroup;
        let routingControl = null;
        let toiletData = [];      
        let userLocation = null;  
        let userMarker = null;
        let selectedType = "all"; 

        function initMap() {
            try {
                map = L.map('map').setView([22.315, 114.170], 11); 
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap contributors' }).addTo(map);
                markersGroup = L.layerGroup().addTo(map);
            } catch (e) {
                console.error("地圖初始化失敗，請檢查 Leaflet 連結是否正確:", e);
                document.getElementById('resultCount').innerText = "❌ 地圖組件載入失敗，請確保聯網並刷新網頁。";
            }
        }

async function fetchToiletData() {
    document.getElementById('resultCount').innerText = "正在從全港公廁、商場及體育館數據庫下載資料...";
    toiletData = []; 

    // === 引擎 1：安全載入 toilets.xml（這才是你原本公廁與流動廁所的真正來源！） ===
    try {
        const xmlResponse = await fetch('toilets.xml');
        if (xmlResponse.ok) {
            const xmlText = await xmlResponse.text();
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlText, 'text/xml');
            const maps = xmlDoc.getElementsByTagName('map');

            for (let i = 0; i < maps.length; i++) {
                const mapNode = maps[i];
                const type = mapNode.getElementsByTagName('map_type')[0]?.textContent || '';
                
                // 這裡完美對應你原本的公廁與流動便溺設施分類
                let finalType = "公廁";
                if (type === "mobile_toilet" || type === "portable_toilet") {
                    finalType = "流動便溺設施";
                } else if (type === "mall") {
                    finalType = "商場";
                }

                const coordText = mapNode.getElementsByTagName('map_coordinate')[0]?.textContent || '';
                const coords = coordText.split(',');
                const lat = parseFloat(coords[0]);
                const lng = parseFloat(coords[1]);

                if (!isNaN(lat) && !isNaN(lng)) {
                    toiletData.push({
                        id: 'xml_' + mapNode.getElementsByTagName('mapID')[0]?.textContent,
                        name: (mapNode.getElementsByTagName('name_c')[0]?.textContent || "未命名設施").trim(),
                        address: (mapNode.getElementsByTagName('address_c')[0]?.textContent || "暫無地址").trim(),
                        district: (mapNode.getElementsByTagName('districtID')[0]?.textContent || "其他").trim(),
                        lat: lat,
                        lng: lng,
                        accessible: mapNode.getElementsByTagName('barrier_free')[0]?.textContent === "Yes",
                        hours: mapNode.getElementsByTagName('openHr_c')[0]?.textContent || "24小時",
                        type: finalType,
                        babyCare: mapNode.getElementsByTagName('baby_care')[0]?.textContent === "Yes",
                        remarks: mapNode.getElementsByTagName('remarks_c')[0]?.textContent || "",
                        distance: null
                    });
                }
            }
        }
    } catch (e) { 
        console.warn("提示: toilets.xml 讀取跳過或失敗", e); 
    }

    // === 引擎 2：安全載入 facility-sc.json（全港體育館 + 自動度分秒轉換相容機制） ===
    try {
        // 💡 提示：如果你 GitHub 上的體育館檔名是 facility-sc (2).json，請把下面這行改為 fetch('facility-sc (2).json');
        const gymResponse = await fetch('facility-sc.json'); 
        if (gymResponse.ok) {
            const gymRaw = await gymResponse.json();
            if (Array.isArray(gymRaw)) {
                const gymFormatted = gymRaw.map((item, index) => {
                    if (!item) return null;

                    let lat = 0, lng = 0;
                    
                    // 安全防漏檢查：確保 Latitude 和 Longitude 存在才進行格式解讀
                    if (item.Latitude && item.Longitude && String(item.Latitude).trim() !== "" && String(item.Longitude).trim() !== "") {
                        const latStr = String(item.Latitude);
                        const lngStr = String(item.Longitude);

                        if (latStr.includes('-')) {
                            // 自動將 22-18-53 這種度分秒破壞格式，轉換為地圖可用的小數格式
                            const latParts = latStr.split('-').map(Number);
                            const lngParts = lngStr.split('-').map(Number);
                            lat = latParts[0] + (latParts[1] / 60) + ((latParts[2] || 0) / 3600);
                            lng = lngParts[0] + (lngParts[1] / 60) + ((lngParts[2] || 0) / 3600);
                        } else {
                            // 如果是正常的小數格式直接讀取
                            lat = parseFloat(item.Latitude);
                            lng = parseFloat(item.Longitude);
                        }
                    }

                    return {
                        id: 'gym_' + index,
                        name: (item.Name_cn || "未命名體育館").trim(),
                        address: (item.Address_cn || "暫無地址").trim(),
                        district: (item.District_cn || "其他").trim(),
                        lat: lat,
                        lng: lng,
                        accessible: true, 
                        hours: item.Opening_hours_cn || "07:00 - 23:00",
                        type: "體育館", 
                        babyCare: item.Facilities_cn ? (String(item.Facilities_cn).includes("育嬰") || String(item.Facilities_cn).includes("嬰兒")) : false,
                        remarks: item.Maintenance_day_cn ? "保養日: " + item.Maintenance_day_cn : "",
                        distance: null
                    };
                }).filter(t => t !== null && t.lat !== 0 && t.lng !== 0 && !isNaN(t.lat) && !isNaN(t.lng));

                toiletData = toiletData.concat(gymFormatted);
            }
        }
    } catch (e) { 
        console.error("錯誤: 體育館數據載入失敗", e); 
    }

    // 🌟 核心保險：解鎖畫面！無論數據讀取成功或失敗，必定執行此行，關閉「下載中」並渲染地圖
    if (typeof filterData === "function") {
        filterData(); 
    } else {
        console.error("找不到 filterData 函數！");
    }
}
            // === ⚙️ 引擎 3：安全載入康文署體育館 JSON ===
            try {
                const lcsdResponse = await fetch('facility-sc.json');
                if (lcsdResponse.ok) {
                    const lcsdRaw = await lcsdResponse.json();
                    
                    if (Array.isArray(lcsdRaw)) {
                        lcsdRaw.forEach((item, index) => {
                            try {
                                if (!item || typeof item !== 'object') return; 

                                let rawLat = item.Latitude || item.lat || "";
                                let rawLng = item.Longitude || item.long || item.lng || "";
                                
                                let lat = parseFloat(typeof rawLat === 'string' ? rawLat.trim() : rawLat);
                                let lng = parseFloat(typeof rawLng === 'string' ? rawLng.trim() : rawLng);
                                
                                if (isNaN(lat) || isNaN(lng)) return; 

                                let chineseDistrict = (item.District_cn || "").trim();
                                if (chineseDistrict && !chineseDistrict.endsWith("區")) {
                                    chineseDistrict = chineseDistrict + "區";
                                }
                                if (chineseDistrict === "油尖區") chineseDistrict = "油尖旺區";

                                const facText = item.Facilities_cn || item.Facilities_en || "";
                                const hasAccessible = facText.includes("無障礙") || facText.includes("暢通易達洗手間");
                                const hasBaby = facText.includes("育嬰") || facText.includes("哺乳");
                                
                                let cleanHours = "07:00 - 23:00";
                                let rawHours = item.Opening_hours_cn || item.Opening_hours_en;
                                if (rawHours && typeof rawHours === 'string') {
                                    cleanHours = rawHours.replace(/<[^>]*>/g, '').replace(/[\r\n\t]/g, '').replace(/每日/g, '').trim();
                                    if (cleanHours.length > 25) cleanHours = cleanHours.substring(0, 22) + "...";
                                }
                                if (!cleanHours || cleanHours.length < 3) cleanHours = "07:00 - 23:00";

                                if (lat > 22.0 && lat < 22.6 && lng > 113.7 && lng < 114.5) {
                                    toiletData.push({
                                        id: 'lcsd_' + index,
                                        name: (item.Name_cn || "體育館設施").trim(),
                                        address: (item.Address_cn || "暫無詳細地址").trim(),
                                        district: chineseDistrict || "其他", 
                                        lat: lat,
                                        lng: lng,
                                        accessible: hasAccessible,
                                        hours: cleanHours,
                                        type: "體育館", 
                                        babyCare: hasBaby,
                                        remarks: "康文署體育館設施",
                                        distance: null
                                    });
                                }
                            } catch (innerErr) { console.warn("略過單條體育館錯誤數據"); }
                        });
                    }
                }
            } catch (e) { console.error("康文署體育館數據源讀取失敗:", e); }

            // === 🚀 鋼鐵防禦：無論如何，只要有地圖，就強行渲染 ===
            const statusLabel = document.getElementById('resultCount');
            if (toiletData.length > 0) {
                statusLabel.innerText = `系統就緒！已成功匯總全港設施共 ${toiletData.length} 個地點。`;
                updateAllDistances();
                filterData(); 
            } else {
                statusLabel.innerText = `⚠ ⚠️ 提示：未偵測到本地數據庫檔案。請確保 toilets.json / fehd_map_c.xml / facility-sc.json 與網頁放在同一個資料夾內。`;
                document.getElementById('toiletList').innerHTML = '<p style="padding:20px; color:#86868b; text-align:center;">暫無可顯示的設施資料。</p>';
            }
        }

        function renderToilets(data) {
            const listContainer = document.getElementById('toiletList');
            listContainer.innerHTML = '';
            if (!markersGroup) return;
            markersGroup.clearLayers();

            if (userLocation) data.sort((a, b) => (a.distance || 0) - (b.distance || 0));

            if (data.length === 0) {
                listContainer.innerHTML = '<p style="padding:20px; color:#86868b; text-align:center;">沒有符合當前篩選條件的設施。</p>';
                return;
            }

            data.forEach(toilet => {
                const card = document.createElement('div');
                card.className = 'toilet-card';
                
                let distHtml = '';
                if (toilet.distance !== null) {
                    const txt = toilet.distance > 1000 ? `${(toilet.distance/1000).toFixed(1)}km` : `${Math.round(toilet.distance)}m`;
                    distHtml = `<div class="distance-badge">${txt}</div>`;
                }

                let typeClass = 'type-gov'; let markerColor = '#007aff';
                if(toilet.type === '商場') { typeClass = 'type-mall'; markerColor = '#ff2d55'; }
                else if(toilet.type === '體育館' || toilet.type === '運動場') { typeClass = 'type-sport'; markerColor = '#af52de'; }
                else if(toilet.type === '社區會堂' || toilet.type === '社區中心') { typeClass = 'type-hall'; markerColor = '#107c41'; }

                let remarkHtml = toilet.remarks && toilet.remarks !== "康文署體育館設施" ? `<p style="color:#ff2d55; font-weight:bold; font-size:0.8rem;">⚠️ ${toilet.remarks}</p>` : '';

                card.innerHTML = `
                    ${distHtml}
                    <h3>${toilet.name}</h3>
                    <p><b>地址:</b> [${toilet.district}] ${toilet.address}</p>
                    ${remarkHtml}
                    <div class="tag-group">
                        <span class="tag ${typeClass}">${toilet.type}</span>
                        <span class="tag">${toilet.hours}</span>
                        ${toilet.accessible ? '<span class="tag active-tag">♿ 無障礙</span>' : ''}
                        ${toilet.babyCare ? '<span class="tag baby-tag">🍼 育嬰室</span>' : ''}
                    </div>
                `;
                
                if (userLocation) {
                    const btn = document.createElement('button'); btn.className = 'route-btn'; btn.innerText = '🗺️ 導航';
                    btn.addEventListener('click', (e) => { e.stopPropagation(); calculateRoute(toilet.lat, toilet.lng); });
                    card.appendChild(btn);
                }

                card.addEventListener('click', () => focusOnToilet(toilet));
                listContainer.appendChild(card);

                const marker = L.circleMarker([toilet.lat, toilet.lng], { radius: 8, fillColor: markerColor, color: '#ffffff', weight: 2, fillOpacity: 0.9 });
                
                let popupRemark = toilet.remarks && toilet.remarks !== "康文署體育館設施" ? `<p style="margin:0 0 5px 0; font-size:11px; color:#ff2d55; font-weight:bold;">⚠️ ${toilet.remarks}</p>` : '';
                
                marker.bindPopup(`
                    <div style="font-family: sans-serif; min-width:160px;">
                        <h4 style="color:${markerColor}; margin-bottom:5px;">${toilet.name}</h4>
                        <p style="margin:0 0 4px 0; font-size:12px; color:#555;">${toilet.address}</p>
                        ${popupRemark}
                        <p style="margin:0 0 6px 0; font-size:11px;">類別：<b>${toilet.type}</b><br>開放：${toilet.hours}</p>
                        ${userLocation ? `<button onclick="calculateRoute(${toilet.lat}, ${toilet.lng})" style="background:#34c759; color:white; border:none; padding:5px; border-radius:4px; font-size:11px; cursor:pointer; width:100%; font-weight:bold;">即刻導航</button>` : ''}
                    </div>
                `);
                marker.toiletId = toilet.id;
                markersGroup.addLayer(marker);
            });
        }

        function calculateHaversineDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; 
            const phi1 = lat1 * Math.PI / 180; const phi2 = lat2 * Math.PI / 180;
            const dPhi = (lat2 - lat1) * Math.PI / 180; const dLam = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dPhi/2) * Math.sin(dPhi/2) + Math.cos(phi1) * Math.cos(phi2) * Math.sin(dLam/2) * Math.sin(dLam/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function getLiveLocation(callback = null) {
            if (!navigator.geolocation) return;
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    userLocation = [position.coords.latitude, position.coords.longitude];
                    if (userMarker) userMarker.setLatLng(userLocation);
                    else userMarker = L.circleMarker(userLocation, { radius: 9, fillColor: "#007aff", color: "#fff", weight: 3, fillOpacity: 1 }).addTo(map).bindPopup("<b>您的位置</b>").openPopup();
                    map.setView(userLocation, 15);
                    updateAllDistances();
                    filterData(); 
                    if(callback) callback();
                },
                (error) => { alert("無法取得定位，請開啟權限。"); },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        }

        function updateAllDistances() {
            if (!userLocation) return;
            toiletData.forEach(t => t.distance = calculateHaversineDistance(userLocation[0], userLocation[1], t.lat, t.lng));
        }

        function findClosestToilet() {
            if (!userLocation) { document.getElementById('geoModal').classList.add('active'); return; }
            let valid = toiletData.filter(t => t.distance !== null);
            if(valid.length === 0) return;
            valid.sort((a, b) => a.distance - b.distance);
            focusOnToilet(valid[0]);
        }

        function focusOnToilet(toilet) {
            map.setView([toilet.lat, toilet.lng], 16);
            if(markersGroup) {
                markersGroup.eachLayer(marker => { if(marker.toiletId === toilet.id) marker.openPopup(); });
            }
            if (userLocation) calculateRoute(toilet.lat, toilet.lng);
        }

        function calculateRoute(destLat, destLng) {
            if (!userLocation || !map) return;
            if (routingControl) map.removeControl(routingControl);
            try {
                routingControl = L.Routing.control({
                    waypoints: [L.latLng(userLocation[0], userLocation[1]), L.latLng(destLat, destLng)],
                    router: L.Routing.osrmv1({ profile: 'foot' }),
                    lineOptions: { styles: [{ color: '#34c759', opacity: 0.8, weight: 6 }] },
                    createMarker: function() { return null; } 
                }).addTo(map);
            } catch(e) { console.warn("路由導航加載失敗"); }
        }

        function handleSearchSuggestions() {
            const input = document.getElementById('searchKeyword').value.trim().toLowerCase();
            const box = document.getElementById('suggestionBox');
            if (input.length === 0) { box.style.display = 'none'; return; }
            const matches = toiletData.filter(t => t.name.toLowerCase().includes(input) || t.address.toLowerCase().includes(input)).slice(0, 6);
            if (matches.length === 0) { box.style.display = 'none'; return; }
            box.innerHTML = '';
            matches.forEach(item => {
                const div = document.createElement('div');
                div.className = 'suggestion-item';
                div.innerHTML = `<span>🔍 ${item.name}</span><span class="sub-text">${item.district}</span>`;
                div.addEventListener('click', () => {
                    document.getElementById('searchKeyword').value = item.name;
                    box.style.display = 'none';
                    filterData();
                    focusOnToilet(item);
                });
                box.appendChild(div);
            });
            box.style.display = 'block';
        }

        function filterData() {
            const keyword = document.getElementById('searchKeyword').value.toLowerCase();
            const district = document.getElementById('districtFilter').value;
            const isAccessible = document.getElementById('accessibleFilter').checked;
            const isTwentyFour = document.getElementById('twentyFourFilter').checked;
            const isBabyCare = document.getElementById('babyCareFilter').checked;

            const filtered = toiletData.filter(toilet => {
                const matchKeyword = toilet.name.toLowerCase().includes(keyword) || toilet.address.toLowerCase().includes(keyword);
                const matchDistrict = district === "" || toilet.district.includes(district);
                const matchAccessible = !isAccessible || toilet.accessible;
                const matchTwentyFour = !isTwentyFour || toilet.hours.includes("24小時") || toilet.hours.includes("二十四小時");
                const matchBabyCare = !isBabyCare || toilet.babyCare;
                
                let matchType = true;
                if (selectedType !== "all") {
                    if (selectedType === "體育館") {
                        matchType = (toilet.type === "體育館" || toilet.type === "運動場");
                    } else if (selectedType === "社區會堂") {
                        matchType = (toilet.type === "社區會堂" || toilet.type === "社區中心");
                    } else {
                        matchType = (toilet.type === selectedType);
                    }
                }

                return matchKeyword && matchDistrict && matchAccessible && matchTwentyFour && matchBabyCare && matchType;
            });

            renderToilets(filtered);
        }

        document.getElementById('typeFilterGroup').addEventListener('click', (e) => {
            if (e.target.classList.contains('type-pill')) {
                document.querySelectorAll('.type-pill').forEach(btn => btn.classList.remove('active'));
                e.target.classList.add('active');
                selectedType = e.target.getAttribute('data-type');
                filterData();
            }
        });

        document.getElementById('searchKeyword').addEventListener('input', () => {
            handleSearchSuggestions();
            filterData();
        });

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.search-container')) {
                document.getElementById('suggestionBox').style.display = 'none';
            }
        });

        document.getElementById('districtFilter').addEventListener('change', filterData);
        document.getElementById('accessibleFilter').addEventListener('change', filterData);
        document.getElementById('twentyFourFilter').addEventListener('change', filterData);
        document.getElementById('babyCareFilter').addEventListener('change', filterData);
        document.getElementById('geoBtn').addEventListener('click', () => getLiveLocation());
        document.getElementById('closestBtn').addEventListener('click', findClosestToilet);
        document.getElementById('modalEnableBtn').addEventListener('click', () => { document.getElementById('geoModal').classList.remove('active'); getLiveLocation(findClosestToilet); });
        document.getElementById('modalCancelBtn').addEventListener('click', () => { document.getElementById('geoModal').classList.remove('active'); });

// 🌟 物理修復版：全自動 XML + JSON 數據清洗引擎
// ==========================================
async function fetchToiletData() {
    try {
        const resultCountEl = document.getElementById('resultCount');
        if (resultCountEl) {
            resultCountEl.innerText = "正在從全港公廁、商場及體育館數據庫下載資料...";
        }
    } catch(e) {}
    
    toiletData = []; 

    // 🚂 引擎 1：安全載入公廁 XML
    try {
        const xmlResponse = await fetch('toilets.xml');
        if (xmlResponse.ok) {
            const xmlText = await xmlResponse.text();
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlText, 'text/xml');
            const maps = xmlDoc.getElementsByTagName('map');

            for (let i = 0; i < maps.length; i++) {
                const mapNode = maps[i];
                const type = mapNode.getElementsByTagName('map_type')[0]?.textContent || '';
                let finalType = "公廁";
                if (type === "mobile_toilet" || type === "portable_toilet") {
                    finalType = "流動便溺設施";
                } else if (type === "mall") {
                    finalType = "商場";
                }

                const coordText = mapNode.getElementsByTagName('map_coordinate')[0]?.textContent || '';
                const coords = coordText.split(',');
                const lat = parseFloat(coords[0]);
                const lng = parseFloat(coords[1]);

                if (!isNaN(lat) && !isNaN(lng)) {
                    toiletData.push({
                        id: 'xml_' + (mapNode.getElementsByTagName('mapID')[0]?.textContent || i),
                        name: (mapNode.getElementsByTagName('name_c')[0]?.textContent || "未命名設施").trim(),
                        address: (mapNode.getElementsByTagName('address_c')[0]?.textContent || "暫無地址").trim(),
                        district: (mapNode.getElementsByTagName('districtID')[0]?.textContent || "其他").trim(),
                        lat: lat,
                        lng: lng,
                        accessible: mapNode.getElementsByTagName('barrier_free')[0]?.textContent === "Yes",
                        hours: mapNode.getElementsByTagName('openHr_c')[0]?.textContent || "24小時",
                        type: finalType,
                        babyCare: mapNode.getElementsByTagName('baby_care')[0]?.textContent === "Yes",
                        remarks: mapNode.getElementsByTagName('remarks_c')[0]?.textContent || "",
                        distance: null
                    });
                }
            }
        }
    } catch (e) { 
        console.warn("提示: toilets.xml 讀取跳過", e); 
    }

    // 🚂 引擎 2：安全載入體育館 JSON (自動度分秒校正)
    try {
        // 💡 核心保險：這裡會同時嘗試讀取 facility-sc.json 和 facility-sc (2).json，看哪一個存在就讀哪一個！你完全不用手動改檔名！
        let gymResponse = await fetch('facility-sc.json');
        if (!gymResponse.ok) {
            gymResponse = await fetch('facility-sc (2).json');
        }
        
        if (gymResponse.ok) {
            const gymRaw = await gymResponse.json();
            if (Array.isArray(gymRaw)) {
                gymRaw.forEach((item, index) => {
                    if (!item) return;

                    let lat = 0, lng = 0;
                    if (item.Latitude && item.Longitude && String(item.Latitude).trim() !== "" && String(item.Longitude).trim() !== "") {
                        const latStr = String(item.Latitude);
                        const lngStr = String(item.Longitude);

                        if (latStr.includes('-')) {
                            const latParts = latStr.split('-').map(Number);
                            const lngParts = lngStr.split('-').map(Number);
                            lat = latParts[0] + (latParts[1] / 60) + ((latParts[2] || 0) / 3600);
                            lng = lngParts[0] + (lngParts[1] / 60) + ((lngParts[2] || 0) / 3600);
                        } else {
                            lat = parseFloat(item.Latitude);
                            lng = parseFloat(item.Longitude);
                        }
                    }

                    if (lat !== 0 && lng !== 0 && !isNaN(lat) && !isNaN(lng)) {
                        toiletData.push({
                            id: 'gym_' + index,
                            name: (item.Name_cn || "未命名體育館").trim(),
                            address: (item.Address_cn || "暫無地址").trim(),
                            district: (item.District_cn || "其他").trim(),
                            lat: lat,
                            lng: lng,
                            accessible: true, 
                            hours: item.Opening_hours_cn || "07:00 - 23:00",
                            type: "體育館", 
                            babyCare: item.Facilities_cn ? (String(item.Facilities_cn).includes("育嬰") || String(item.Facilities_cn).includes("嬰兒")) : false,
                            remarks: item.Maintenance_day_cn ? "保養日: " + item.Maintenance_day_cn : "",
                            distance: null
                        });
                    }
                });
            }
        }
    } catch (e) { 
        console.error("錯誤: 體育館數據載入失敗", e); 
    }

    // 🚂 引擎 3：載入獨立商場 toilets.json
    try {
        const jsonResponse = await fetch('toilets.json');
        if (jsonResponse.ok) {
            const jsonRaw = await jsonResponse.json();
            if (Array.isArray(jsonRaw)) {
                jsonRaw.forEach((item, index) => {
                    if (!item) return;
                    const lat = parseFloat(item.Latitude);
                    const lng = parseFloat(item.Longitude);
                    if (!isNaN(lat) && !isNaN(lng)) {
                        toiletData.push({
                            id: 'mall_' + index,
                            name: (item.Name_tc || "未命名設施").trim(),
                            address: (item.Address_tc || "暫無地址").trim(),
                            district: (item.District_tc || "其他").trim(),
                            lat: lat,
                            lng: lng,
                            accessible: item.Barrier_free_access === "Yes" || item.Barrier_free_access === "設有",
                            hours: item.Opening_hours_tc || "10:00 - 22:00",
                            type: item.Type || "商場",
                            babyCare: item.Baby_care === "設有",
                            remarks: "",
                            distance: null 
                        });
                    }
                });
            }
        }
    } catch (e) { 
        console.warn("提示: toilets.json 讀取跳過", e); 
    }

    // 🌟 強制關閉「下載中」並渲染地圖開關
    if (typeof filterData === "function") {
        filterData(); 
    }
}
        window.onload = () => { initMap(); fetchToiletData(); };
    </script>
